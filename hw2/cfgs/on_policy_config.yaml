defaults:
  - _self_
  - override hydra/launcher: submitit_local

# task settings
action_repeat: 2
discount: 0.99

# train settings
num_train_frames: 1000000
bc_freq: 0             # disable BC interleaving during PPO training

warmup: 2000

# eval
eval_every_frames: 2000
num_eval_episodes: 50

# rollout buffer (replaces replay buffer)
rollout_length: 4096   # steps collected before each PPO update (T in the paper)
batch_size: 64         # mini-batch size within each PPO epoch
pretrain_steps: 10000

# demo buffer (BC pre-training only)
replay_buffer_size: 100000
replay_buffer_num_workers: 4
nstep: 1               # no n-step returns needed for BC
save_snapshot: false

# misc
seed: 2
device: cpu
save_video: true
use_wandb: true
wandb_project: "metaworld"
wandb_entity: 
wandb_group: on_policy

# experiment
experiment: ppo_exp

# shared lr
lr: 3e-4 # PPO learning rate

agent:
  _target_: on_policy.PPOAgent
  obs_shape: ??? # filled in by make_agent
  action_shape: ??? # filled in by make_agent
  device: ${device}
  lr: ${lr}
  batch_size: ${batch_size}
  hidden_dim: 64

  # core PPO hyperparameters
  clip_eps: 0.1 # clipping range for surrogate objective
  ppo_epochs: 3 # gradient epochs per rollout
  value_coef: 0.5 # c1: value loss weight
  entropy_coef: 0.01 # c2: entropy bonus weight (exploration)
  reverse_kl_coef: 0.01 # c3: reverse KL regularization weight
  gae_lambda: 0.99 # lambda for Generalised Advantage Estimation
  gamma: 0.99 # discount factor (mirrors top-level discount)

hydra:
  run:
    dir: ./Logdir/run_${now:%H%M%S}_${hydra.job.override_dirname}
  sweep:
    dir: ./exp/${now:%Y.%m.%d}/${now:%H%M}_${agent_cfg.experiment}
    subdir: ${hydra.job.num}
  launcher:
    timeout_min: 4300
    cpus_per_task: 8
    tasks_per_node: 1
    mem_gb: 160
    nodes: 1
    submitit_folder: ./exp/${now:%Y.%m.%d}/${now:%H%M%S}_${agent_cfg.experiment}/.slurm
